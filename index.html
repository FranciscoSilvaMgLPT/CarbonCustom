<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbon Custom ©</title>
<link rel="icon" type="image/png" href="favicon.png">

<link rel="apple-touch-icon" href="favicon.png">
<link rel="shortcut icon" href="favicon.png">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9f9f9; margin: 0; padding: 0; color: #333; }
        header { background-color: #ffffff; padding: 0; text-align: center; }
        
        /* Estilos da logo com Media Query */
        .logo-header { width: 100%; display: block; }
        
        @media (max-width: 768px) {
            .logo-header { content: url('carbonMovel3.png'); }
        }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .card { background: white; border-radius: 12px; overflow: hidden; transition: transform 0.3s ease; border: 1px solid #eee; cursor: pointer; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 250px; object-fit: cover; display: block; }
        .card-content { padding: 20px; }
        .card-content h3 { margin: 0 0 10px 0; font-size: 1.2rem; }
        
        /* Modal Galeria */
        #modal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; }
        #modal.active { display: flex; }
        #modal-img { max-width: 90%; max-height: 70%; border-radius: 8px; border: 3px solid white; }
        .modal-nav { display: flex; gap: 20px; margin-top: 20px; align-items: center; }
        .modal-nav button { padding: 10px 20px; cursor: pointer; background: white; border: none; border-radius: 5px; font-weight: bold; }
        #contador-fotos { color: white; font-weight: bold; font-size: 1rem; }
        .close-btn { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }
        
        footer { text-align: center; padding: 40px; color: #aaa; font-size: 0.8rem; background-color: #f9f9f9; }
        .footer-insta { color: #666; text-decoration: none; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

    <header>
        <img src="carbonCCedited.png" alt="Carbon Custom Logo" class="logo-header">
    </header>

    <div class="container" id="produtos-container"></div>

    <div id="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img id="modal-img" src="" alt="Ampliada">
        <div class="modal-nav" id="modal-nav">
            <button onclick="mudarFoto(-1)">Anterior</button>
            <span id="contador-fotos"></span>
            <button onclick="mudarFoto(1)">Próxima</button>
        </div>
    </div>

    <footer>
        <a href="https://www.instagram.com/carboncustom_pt" target="_blank" class="footer-insta">
            <img src="https://static.cdninstagram.com/rsrc.php/yr/r/rzWiSjZRxk5.webp" alt="Instagram" style="width: 20px; height: 20px;">
            Siga-nos no Instagram
        </a>
        <br><br>
        <p>&copy; 2026 CarbonCustom</p>
        <a href="admin.html" style="color: #ccc; text-decoration: none; font-size: 0.7rem;">Acesso Administrativo</a>
    </footer>

    <script>
        const supabaseUrl = 'https://sdzikuotcdontpxufvai.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNkemlrdW90Y2RvbnRweHVmdmFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MDUzNjgsImV4cCI6MjA5NzI4MTM2OH0.G3FsKvyKNprVUM5I1rwf4t06KVbKujvIjgBsKIyVG-o';
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        let galeriaAtual = [];
        let indexFotoAtual = 0;

        async function carregarProdutos() {
            const container = document.getElementById('produtos-container');
            const { data, error } = await client.from('produtos').select('*').order('id', { ascending: false });

            if (error || !data || data.length === 0) {
                container.innerHTML = '<p>Nenhum produto disponível.</p>';
                return;
            }

            container.innerHTML = data.map(p => {
                const fotos = p.imagem_url ? p.imagem_url.split(',') : [];
                return `
                    <div class="card" onclick="openModal('${p.imagem_url}')">
                        <img src="${fotos[0]}" alt="${p.nome}">
                        <div class="card-content">
                            <h3>${p.nome}</h3>
                            <p>${p.descricao}</p>
                        </div>
                    </div>`;
            }).join('');
        }

        function openModal(urlsString) {
            galeriaAtual = urlsString.split(',');
            indexFotoAtual = 0;
            
            atualizarModal();
            document.getElementById('modal').classList.add('active');
        }

        function atualizarModal() {
            document.getElementById('modal-img').src = galeriaAtual[indexFotoAtual];
            document.getElementById('contador-fotos').innerText = `${indexFotoAtual + 1} / ${galeriaAtual.length}`;
            
            const navButtons = document.getElementById('modal-nav');
            navButtons.style.display = (galeriaAtual.length > 1) ? 'flex' : 'none';
        }

        function mudarFoto(direcao) {
            indexFotoAtual += direcao;
            if (indexFotoAtual < 0) indexFotoAtual = galeriaAtual.length - 1;
            if (indexFotoAtual >= galeriaAtual.length) indexFotoAtual = 0;
            atualizarModal();
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        carregarProdutos();
    </script>
</body>
</html>
