<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Catálogo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9f9f9; margin: 0; padding: 0; color: #333; }
        header { background-color: #ffffff; padding: 0; text-align: center; }
        header img { width: 100%; display: block; }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        
        .card { background: white; border-radius: 12px; overflow: hidden; transition: transform 0.3s ease; border: 1px solid #eee; cursor: pointer; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 250px; object-fit: cover; display: block; }
        
        .card-content { padding: 20px; }
        .card-content h3 { margin: 0 0 10px 0; font-size: 1.2rem; }

        /* Estilo do Modal */
        #modal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; }
        #modal img { max-width: 90%; max-height: 80%; border-radius: 8px; border: 3px solid white; }
        #modal.active { display: flex; }

        .close-btn { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; font-weight: bold; cursor: pointer; }
        
        footer { text-align: center; padding: 40px; color: #aaa; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <img src="carbonCCedited.png" alt="Carbon Custom Logo">
    </header>

    <div class="container" id="produtos-container">
        <p>Carregando produtos...</p>
    </div>

    <div id="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img id="modal-img" src="" alt="Imagem Ampliada">
    </div>

    <footer>
    &copy; 2026 CarbonCustom | <a href="admin.html" style="color: #ccc; text-decoration: none; font-size: 0.7rem;">Acesso Administrativo</a>
</footer>

    <script>
       const supabaseUrl = 'https://sdzikuotcdontpxufvai.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNkemlrdW90Y2RvbnRweHVmdmFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MDUzNjgsImV4cCI6MjA5NzI4MTM2OH0.G3FsKvyKNprVUM5I1rwf4t06KVbKujvIjgBsKIyVG-o';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function carregarProdutos() {
            const container = document.getElementById('produtos-container');
            const { data, error } = await supabase.from('produtos').select('*');

            if (error) {
                container.innerHTML = '<p>Erro ao carregar produtos.</p>';
                return;
            }

            container.innerHTML = ''; // Limpa o "Carregando..."
            
            data.forEach(p => {
                container.innerHTML += `
                    <div class="card" onclick="openModal('${p.imagem_url}')">
                        <img src="${p.imagem_url}" alt="${p.nome}">
                        <div class="card-content">
                            <h3>${p.nome}</h3>
                            <p>${p.descricao}</p>
                        </div>
                    </div>
                `;
            });
        }

        function openModal(src) {
            document.getElementById('modal-img').src = src;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // Iniciar
        carregarProdutos();
    </script>
</body>
</html>
