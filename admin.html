<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - CarbonCustom</title>
    <link rel="icon" type="image/png" href="CC-removebg-preview.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9f9f9; margin: 0; padding: 0; color: #333; }
        header { background-color: #ffffff; padding: 0; text-align: center; }
        header img { width: 100%; display: block; }
        .admin-container { max-width: 800px; margin: 40px auto; padding: 30px; background: white; border-radius: 12px; border: 1px solid #eee; }
        input, button { display: block; width: 100%; margin: 10px 0; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background-color: #333; color: white; cursor: pointer; border: none; font-weight: bold; }
        .btn-edit { background-color: #555; margin-right: 5px; }
        .btn-danger { background-color: #d9534f; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #666; text-decoration: none; }
        footer { text-align: center; padding: 40px; color: #aaa; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header><img src="carbonCCedited.png" alt="Carbon Custom Logo"></header>
    <div class="admin-container">
        <a href="index.html" class="back-link">&larr; Voltar para o Catálogo</a>
        
        <div id="login-form">
            <h2>Login</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Senha">
            <button onclick="fazerLogin()">Entrar</button>
        </div>

        <div id="admin-panel" style="display:none;">
            <h2 id="form-title">Adicionar Produto</h2>
            <input type="hidden" id="edit-id">
            <input type="text" id="nome" placeholder="Nome">
            <input type="text" id="desc" placeholder="Descrição">
            <p style="font-size: 0.8rem; color: #666;">Selecione uma ou várias fotos:</p>
            <input type="file" id="imagem" multiple>
            <button id="btn-acao" onclick="salvarProduto()">Salvar Produto</button>
            <button id="btn-cancel" style="display:none; background-color: #666;" onclick="resetForm()">Cancelar Edição</button>

            <hr>
            <h3>Gerir Produtos Existentes</h3>
            <table>
                <thead><tr><th>Produto</th><th>Descrição</th><th>Ações</th></tr></thead>
                <tbody id="tabela-corpo"></tbody>
            </table>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 CarbonCustom</p>
    </footer>

    <script>
        const supabaseUrl = 'https://sdzikuotcdontpxufvai.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNkemlrdW90Y2RvbnRweHVmdmFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MDUzNjgsImV4cCI6MjA5NzI4MTM2OH0.G3FsKvyKNprVUM5I1rwf4t06KVbKujvIjgBsKIyVG-o';
        window.mySupabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function fazerLogin() {
            const { error } = await window.mySupabase.auth.signInWithPassword({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            });
            if (error) alert(error.message);
            else { document.getElementById('login-form').style.display = 'none'; document.getElementById('admin-panel').style.display = 'block'; listarProdutos(); }
        }

        async function listarProdutos() {
            const { data } = await window.mySupabase.from('produtos').select('*');
            const tbody = document.getElementById('tabela-corpo');
            tbody.innerHTML = data.map(p => {
                const primeiraFoto = p.imagem_url ? p.imagem_url.split(',')[0] : '';
                return `
                <tr>
                    <td>
                        <img src="${primeiraFoto}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 4px; margin-right: 10px;">
                        <strong>${p.nome}</strong>
                    </td>
                    <td>${p.descricao}</td>
                    <td>
                        <button class="btn-edit" onclick="prepararEdicao(${p.id}, '${p.nome}', '${p.descricao}')">Editar</button>
                        <button class="btn-danger" onclick="apagarProduto(${p.id})">Apagar</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function prepararEdicao(id, nome, desc) {
            document.getElementById('edit-id').value = id;
            document.getElementById('nome').value = nome;
            document.getElementById('desc').value = desc;
            document.getElementById('form-title').innerText = "Editar Produto";
            document.getElementById('btn-acao').innerText = "Atualizar Textos";
            document.getElementById('btn-cancel').style.display = "block";
        }

        function resetForm() {
            document.getElementById('edit-id').value = '';
            document.getElementById('nome').value = '';
            document.getElementById('desc').value = '';
            document.getElementById('form-title').innerText = "Adicionar Produto";
            document.getElementById('btn-acao').innerText = "Salvar Produto";
            document.getElementById('btn-cancel').style.display = "none";
        }

        async function salvarProduto() {
            const id = document.getElementById('edit-id').value;
            const nome = document.getElementById('nome').value;
            const desc = document.getElementById('desc').value;
            const files = document.getElementById('imagem').files;

            // Se for novo produto, faz upload das fotos
            let urls = [];
            if (files.length > 0) {
                for (let file of files) {
                    const fileName = `${Date.now()}_${file.name}`;
                    await window.mySupabase.storage.from('produtos').upload(fileName, file);
                    const { data } = window.mySupabase.storage.from('produtos').getPublicUrl(fileName);
                    urls.push(data.publicUrl);
                }
            }

            if (id) {
                // Atualizar (Apenas texto. Se quiser fotos novas, sugerimos deletar e criar novo)
                await window.mySupabase.from('produtos').update({ nome, descricao: desc }).eq('id', id);
                alert('Informações atualizadas!');
            } else {
                // Criar novo
                await window.mySupabase.from('produtos').insert([{ 
                    nome, 
                    descricao: desc, 
                    imagem_url: urls.join(',') 
                }]);
                alert('Produto adicionado com ' + urls.length + ' foto(s)!');
            }
            resetForm();
            listarProdutos();
        }

        async function apagarProduto(id) {
            if(!confirm('Tem certeza?')) return;
            await window.mySupabase.from('produtos').delete().eq('id', id);
            listarProdutos();
        }
    </script>
</body>
</html>
