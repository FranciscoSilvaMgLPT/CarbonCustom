<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - CarbonCustom</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Estilos herdados do seu index */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9f9f9; margin: 0; padding: 0; color: #333; }
        header { background-color: #ffffff; padding: 0; text-align: center; }
        header img { width: 100%; display: block; }
        
        /* Estilo do Painel Admin */
        .admin-container { max-width: 600px; margin: 40px auto; padding: 30px; background: white; border-radius: 12px; border: 1px solid #eee; }
        input, button { display: block; width: 100%; margin: 15px 0; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background-color: #333; color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background-color: #555; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #666; text-decoration: none; }
    </style>
</head>
<body>

    <header>
        <img src="carbonCCedited.png" alt="Carbon Custom Logo">
    </header>

    <div class="admin-container">
        <a href="index.html" class="back-link">&larr; Voltar para o Catálogo</a>
        
        <div id="login-form">
            <h2>Login Administrador CarbonCustom</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Senha">
            <button onclick="fazerLogin()">Entrar</button>
        </div>

        <div id="admin-panel" style="display:none;">
            <h2>Adicionar Produto</h2>
            <input type="text" id="nome" placeholder="Nome do Produto">
            <input type="text" id="desc" placeholder="Descrição">
            <label>Foto do Produto:</label>
            <input type="file" id="imagem">
            <button onclick="adicionarProduto()">Salvar Produto no Catálogo</button>
        </div>
    </div>

    <script>
        const supabase = supabase.createClient('https://sdzikuotcdontpxufvai.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNkemlrdW90Y2RvbnRweHVmdmFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MDUzNjgsImV4cCI6MjA5NzI4MTM2OH0.G3FsKvyKNprVUM5I1rwf4t06KVbKujvIjgBsKIyVG-o');

        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (!error) {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
            } else {
                alert('Erro ao logar: ' + error.message);
            }
        }

        async function adicionarProduto() {
            const file = document.getElementById('imagem').files[0];
            const nome = document.getElementById('nome').value;
            const desc = document.getElementById('desc').value;
            
            if (!file || !nome) return alert('Preencha todos os campos!');

            const fileName = `${Date.now()}_${file.name}`;

            const { data: uploadData, error: uploadError } = await supabase.storage
                .from('produtos')
                .upload(fileName, file);

            if (uploadError) return alert('Erro no upload: ' + uploadError.message);

            const { data: { publicUrl } } = supabase.storage.from('produtos').getPublicUrl(fileName);

            const { error } = await supabase.from('produtos').insert([
                { nome: nome, descricao: desc, imagem_url: publicUrl }
            ]);

            if (error) alert('Erro ao salvar no banco: ' + error.message);
            else {
                alert('Produto adicionado com sucesso!');
                location.reload();
            }
        }
    </script>
</body>
</html>
