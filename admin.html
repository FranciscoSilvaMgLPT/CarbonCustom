<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - CarbonCustom</title>
    <link rel="icon" type="image/png" href="CC-removebg-preview.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f9f9f9; margin: 0; padding: 20px; color: #333; }
        .admin-container { max-width: 800px; margin: 0 auto; padding: 30px; background: white; border-radius: 12px; border: 1px solid #eee; }
        input, button { display: block; width: 100%; margin: 10px 0; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background-color: #333; color: white; cursor: pointer; border: none; font-weight: bold; }
        .btn-edit { background-color: #f0ad4e; }
        .btn-danger { background-color: #d9534f; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h2>Painel de Gestão</h2>
        
        <div id="form-container">
            <input type="hidden" id="edit-id">
            <input type="text" id="nome" placeholder="Nome do Produto">
            <input type="text" id="desc" placeholder="Descrição">
            <input type="file" id="imagem">
            <button id="btn-save" onclick="salvarProduto()">Salvar Produto</button>
            <button id="btn-cancel" style="display:none;" onclick="resetForm()">Cancelar Edição</button>
        </div>

        <table>
            <thead><tr><th>Nome</th><th>Ações</th></tr></thead>
            <tbody id="tabela-corpo"></tbody>
        </table>
    </div>

    <script>
        const supabaseUrl = 'https://sdzikuotcdontpxufvai.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNkemlrdW90Y2RvbnRweHVmdmFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MDUzNjgsImV4cCI6MjA5NzI4MTM2OH0.G3FsKvyKNprVUM5I1rwf4t06KVbKujvIjgBsKIyVG-o';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function listarProdutos() {
            const { data } = await supabase.from('produtos').select('*');
            const tbody = document.getElementById('tabela-corpo');
            tbody.innerHTML = data.map(p => `
                <tr>
                    <td>${p.nome}</td>
                    <td>
                        <button class="btn-edit" onclick="prepararEdicao(${p.id}, '${p.nome}', '${p.descricao}')">Editar</button>
                        <button class="btn-danger" onclick="apagarProduto(${p.id})">Apagar</button>
                    </td>
                </tr>
            `).join('');
        }

        function prepararEdicao(id, nome, desc) {
            document.getElementById('edit-id').value = id;
            document.getElementById('nome').value = nome;
            document.getElementById('desc').value = desc;
            document.getElementById('btn-save').innerText = 'Atualizar Produto';
            document.getElementById('btn-cancel').style.display = 'block';
        }

        async function salvarProduto() {
            const id = document.getElementById('edit-id').value;
            const nome = document.getElementById('nome').value;
            const desc = document.getElementById('desc').value;

            if (id) {
                // Atualizar
                await supabase.from('produtos').update({ nome, descricao: desc }).eq('id', id);
            } else {
                // Inserir (lógica original de upload...)
                await supabase.from('produtos').insert([{ nome, descricao: desc }]);
            }
            resetForm();
            listarProdutos();
        }

        function resetForm() {
            document.getElementById('edit-id').value = '';
            document.getElementById('nome').value = '';
            document.getElementById('desc').value = '';
            document.getElementById('btn-save').innerText = 'Salvar Produto';
            document.getElementById('btn-cancel').style.display = 'none';
        }

        async function apagarProduto(id) {
            if(confirm('Tem certeza?')) {
                await supabase.from('produtos').delete().eq('id', id);
                listarProdutos();
            }
        }

        listarProdutos();
    </script>
</body>
</html>
